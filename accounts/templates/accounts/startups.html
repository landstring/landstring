{% extends "accounts/base.html" %}
{% load static %}

{% block styles %}
<link rel="stylesheet" href="{% static 'accounts/css/ideas_list.css' %}">
{% endblock styles %}


{% block content %}
<div class="main">
    <div class="ideas_list">
        {% for idea in ideas %}
        <div class="idea">
            <a href="{{ idea.id }}" class="idea_title"><h3 class="idea_title">{{ idea.name }}</h3></a>
            <hr />
            <div class="creator">
                <h3 class="text">Создатель: </h3>
                <h3 class="name">{{ idea.creator.first_name}} {{ idea.creator.last_name }}</h3>
            </div>

        </div>
        {% endfor %}
    </div>
    
</div>
{% endblock content %}
